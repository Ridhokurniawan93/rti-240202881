# =============================================================
# Konfigurasi Eksperimen DBMS Benchmarking
# Analisis Dampak Query Optimization & Indexing Strategy
# terhadap Performa PostgreSQL dan MySQL dalam Workload CRUD
# =============================================================

experiment:
  random_seed: 42
  replications: 5
  seeds: [42, 123, 456, 789, 1024]
  warmup_queries: 5

dbms:
  postgresql:
    host: 127.0.0.1
    port: 5433
    database: benchmark_db
    user: postgres
    password: benchmark
  mysql:
    host: 127.0.0.1
    port: 3306
    database: benchmark_db
    user: root
    password: benchmark

dataset:
  volumes: [50000, 100000, 250000, 500000, 1000000]
  data_dir: data/
  table_name: app_playstore
  columns: 19

conditions:
  - id: C1
    dbms: postgresql
    index_type: none
    query_version: default
  - id: C2
    dbms: postgresql
    index_type: single
    query_version: default
  - id: C3
    dbms: postgresql
    index_type: composite
    query_version: default
  - id: C4
    dbms: postgresql
    index_type: composite
    query_version: optimized
  - id: C5
    dbms: mysql
    index_type: none
    query_version: default
  - id: C6
    dbms: mysql
    index_type: single
    query_version: default
  - id: C7
    dbms: mysql
    index_type: composite
    query_version: default
  - id: C8
    dbms: mysql
    index_type: composite
    query_version: optimized

operations:
  - SELECT
  - INSERT
  - UPDATE
  - DELETE

output:
  results_dir: results/
  logs_dir: logs/
  log_level: INFO
